    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { height:100%; overflow:hidden; }
    body { font-family:'HubSpot Sans',-apple-system,sans-serif; background:#111; color:#ccc; display:flex; flex-direction:column; }

    .app-header { height:48px; background:#1a1a1a; border-bottom:1px solid #282828; display:flex; align-items:center; padding:0 16px; gap:10px; flex-shrink:0; z-index:100; }
    .app-title { font-family:'Lexend Deca',sans-serif; font-size:12.5px; font-weight:500; color:#fff; letter-spacing:.3px; white-space:nowrap; margin-right:8px; }
    .app-title span { color:#FF5C35; }
    .hdr-sep { width:1px; height:20px; background:#2d2d2d; margin:0 4px; }
    .hdr-btn { font-family:'Lexend Deca',sans-serif; font-size:11.5px; font-weight:400; padding:5px 13px; border-radius:5px; cursor:pointer; border:none; transition:all .15s; color:#888; background:#242424; }
    .hdr-btn:hover { background:#2d2d2d; color:#ccc; }
    .hdr-btn.active { color:#FF5C35; border:1px solid rgba(255,92,53,.35); background:#2a1a14; }
    .hdr-btn.accent { background:#FF5C35; color:#fff; }
    .hdr-btn.accent:hover { background:#e04828; }
    .hdr-spacer { flex:1; }

    .app-body { display:flex; flex:1; overflow:hidden; }

    .preview-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .preview-toolbar { display:flex; align-items:center; padding:8px 20px; gap:8px; border-bottom:1px solid #1e1e1e; flex-shrink:0; background:#161616; }

  h2:{text:'Reach out at the right time.',ff:"'HubSpot Serif', Georgia, serif",fs:40,fw:400,lh:1.2,ls:-0.015,col:'#1A1A1A',pt:4,pb:8,dur:1000,del:150,y:24,bl:12,x1:0,y1:0,x2:0.4,y2:1},
  h3:{text:'Less time researching.',ff:"'HubSpot Sans', sans-serif",fs:28,fw:500,lh:1.3,ls:-0.008,col:'#1A1A1A',pt:8,pb:4,dur:900,del:250,y:20,bl:10,x1:0,y1:0,x2:0.4,y2:1},
  h4:{text:'More time selling.',ff:"'HubSpot Sans', sans-serif",fs:20,fw:600,lh:1.4,ls:0,col:'#525252',pt:4,pb:4,dur:800,del:350,y:16,bl:8,x1:0,y1:0,x2:0.4,y2:1},
  h5:{text:'Prospecting Agent · HubSpot',ff:"'Lexend Deca', sans-serif",fs:13,fw:600,lh:1.5,ls:0.05,col:'#8A8A8A',pt:4,pb:4,dur:700,del:450,y:12,bl:6,x1:0,y1:0,x2:0.4,y2:1},
};
const S={sel:'h1',h:JSON.parse(JSON.stringify(DEFAULTS)),snaps:JSON.parse(localStorage.getItem('tas_v2')||'[]'),abA:null,abB:null,abMode:false,bg:'warm'};
const BM=10,BR=140;
function bToS(bx,by){return{x:BM+bx*BR,y:BM+BR-by*BR};}
function sToBraw(sx,sy){return{x:(sx-BM)/BR,y:(BM+BR-sy)/BR};}
function clampX(v){return Math.max(0,Math.min(1,v));}
function isDarkBg(bg){return bg==='dark'||bg==='black';}
function updateBezSVG(){
  const h=S.h[S.sel];
  const p1=bToS(h.x1,h.y1),p2=bToS(h.x2,h.y2);
  const s={x:BM,y:BM+BR},e={x:BM+BR,y:BM};
  $('bz-cp1').setAttribute('cx',p1.x); $('bz-cp1').setAttribute('cy',p1.y);
  $('bz-cp2').setAttribute('cx',p2.x); $('bz-cp2').setAttribute('cy',p2.y);
  $('bz-arm1').setAttribute('x1',s.x); $('bz-arm1').setAttribute('y1',s.y); $('bz-arm1').setAttribute('x2',p1.x); $('bz-arm1').setAttribute('y2',p1.y);
  $('bz-arm2').setAttribute('x1',e.x); $('bz-arm2').setAttribute('y1',e.y); $('bz-arm2').setAttribute('x2',p2.x); $('bz-arm2').setAttribute('y2',p2.y);
  $('bz-curve').setAttribute('d',`M ${s.x} ${s.y} C ${p1.x} ${p1.y}, ${p2.x} ${p2.y}, ${e.x} ${e.y}`);
  $('bz-x1').value=r3(h.x1); $('bz-y1').value=r3(h.y1); $('bz-x2').value=r3(h.x2); $('bz-y2').value=r3(h.y2);
  $('bz-display').textContent=`${r3(h.x1)}, ${r3(h.y1)}, ${r3(h.x2)}, ${r3(h.y2)}`;
}
function initBezDrag(){
  const svg=$('bez-svg'); let drag=null;
  function svgPt(cx,cy){const r=svg.getBoundingClientRect();return{x:(cx-r.left)*(160/r.width),y:(cy-r.top)*(160/r.height)};}
  function applyDrag(cx,cy){const pt=svgPt(cx,cy);const bz=sToBraw(pt.x,pt.y);const h=S.h[S.sel];if(drag==='cp1'){h.x1=clampX(bz.x);h.y1=bz.y;}else{h.x2=clampX(bz.x);h.y2=bz.y;}updateBezSVG();applyStyles(S.sel);playOne(S.sel);}
  $('bz-cp1').addEventListener('mousedown',e=>{drag='cp1';e.preventDefault();});
  $('bz-cp2').addEventListener('mousedown',e=>{drag='cp2';e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(drag)applyDrag(e.clientX,e.clientY);});
  document.addEventListener('mouseup',()=>{drag=null;});
  $('bz-cp1').addEventListener('touchstart',e=>{drag='cp1';e.preventDefault();},{passive:false});
  $('bz-cp2').addEventListener('touchstart',e=>{drag='cp2';e.preventDefault();},{passive:false});
  document.addEventListener('touchmove',e=>{if(drag){const t=e.touches[0];applyDrag(t.clientX,t.clientY);}},{passive:false});
  document.addEventListener('touchend',()=>{drag=null;});
}
function applyStyles(lv){
  const h=S.h[lv],el=$('preview-'+lv); if(!el)return;
  Object.assign(el.style,{fontFamily:h.ff,fontSize:h.fs+'px',fontWeight:h.fw,lineHeight:h.lh,letterSpacing:h.ls+'em',color:h.col,paddingTop:h.pt+'px',paddingBottom:h.pb+'px'});
  el.textContent=h.text;
}
function injectKF(lv){
  const id='kf-'+lv; let t=document.getElementById(id);
  if(!t){t=document.createElement('style');t.id=id;document.head.appendChild(t);}
  const h=S.h[lv];
  t.textContent=`@keyframes ${id}{from{opacity:0;transform:translateY(${h.y}px);filter:blur(${h.bl}px);}to{opacity:1;transform:none;filter:none;}}`;
}
function playOne(lv){
  injectKF(lv); const h=S.h[lv],el=$('preview-'+lv); if(!el)return;
  el.style.animation='none'; el.offsetHeight;
  el.style.animation=`kf-${lv} ${h.dur}ms cubic-bezier(${r3(h.x1)},${r3(h.y1)},${r3(h.x2)},${r3(h.y2)}) ${h.del}ms both`;
}
function playAll(){if(S.abMode){renderAB();return;}LEVELS.forEach(lv=>{applyStyles(lv);playOne(lv);});}
function syncCtrl(){
  const h=S.h[S.sel];
  $('ctrl-text').value=h.text; setOpt('ctrl-ff',h.ff); setSlide('ctrl-fs','ctrl-fs-n',h.fs);
  setOpt('ctrl-fw',String(h.fw)); setSlide('ctrl-lh','ctrl-lh-n',h.lh); setSlide('ctrl-ls','ctrl-ls-n',h.ls);
  $('ctrl-color').value=h.col; $('ctrl-color-hex').textContent=h.col;
  setSlide('ctrl-pt','ctrl-pt-n',h.pt); setSlide('ctrl-pb','ctrl-pb-n',h.pb);
  setSlide('ctrl-dur','ctrl-dur-n',h.dur); setSlide('ctrl-del','ctrl-del-n',h.del);
  setSlide('ctrl-y','ctrl-y-n',h.y); setSlide('ctrl-bl','ctrl-bl-n',h.bl);
  updateBezSVG();
  document.querySelectorAll('.level-tab').forEach(b=>b.classList.toggle('active',b.dataset.level===S.sel));
  LEVELS.forEach(lv=>{const el=$('preview-'+lv);if(el)el.classList.toggle('selected',lv===S.sel);});
}
function setSlide(rid,nid,val){$(rid).value=val;$(nid).value=val;}
function setOpt(id,val){const el=$(id);for(let o of el.options)if(o.value===val){el.value=val;return;}const o=document.createElement('option');o.value=val;o.textContent=val;el.appendChild(o);el.value=val;}
function bindCtrl(){
  const g=()=>S.h[S.sel];
  $('ctrl-text').addEventListener('input',e=>{g().text=e.target.value;applyStyles(S.sel);});
  $('ctrl-ff').addEventListener('change',e=>{g().ff=e.target.value;applyStyles(S.sel);playOne(S.sel);});
  bindSl('ctrl-fs','ctrl-fs-n',v=>{g().fs=+v;applyStyles(S.sel);playOne(S.sel);});
  $('ctrl-fw').addEventListener('change',e=>{g().fw=+e.target.value;applyStyles(S.sel);playOne(S.sel);});
  bindSl('ctrl-lh','ctrl-lh-n',v=>{g().lh=+v;applyStyles(S.sel);});
  bindSl('ctrl-ls','ctrl-ls-n',v=>{g().ls=+v;applyStyles(S.sel);});
  $('ctrl-color').addEventListener('input',e=>{g().col=e.target.value;$('ctrl-color-hex').textContent=e.target.value;applyStyles(S.sel);});
  bindSl('ctrl-pt','ctrl-pt-n',v=>{g().pt=+v;applyStyles(S.sel);});
  bindSl('ctrl-pb','ctrl-pb-n',v=>{g().pb=+v;applyStyles(S.sel);});
  bindSl('ctrl-dur','ctrl-dur-n',v=>{g().dur=+v;playOne(S.sel);});
  bindSl('ctrl-del','ctrl-del-n',v=>{g().del=+v;playOne(S.sel);});
  bindSl('ctrl-y','ctrl-y-n',v=>{g().y=+v;injectKF(S.sel);playOne(S.sel);});
  bindSl('ctrl-bl','ctrl-bl-n',v=>{g().bl=+v;injectKF(S.sel);playOne(S.sel);});
  ['x1','y1','x2','y2'].forEach(k=>{$('bz-'+k).addEventListener('change',e=>{const v=+e.target.value;S.h[S.sel][k]=(k==='x1'||k==='x2')?clampX(v):v;updateBezSVG();playOne(S.sel);});});
  document.querySelectorAll('.bez-preset').forEach(btn=>{btn.addEventListener('click',()=>{const[x1,y1,x2,y2]=btn.dataset.e.split(',').map(Number);Object.assign(S.h[S.sel],{x1,y1,x2,y2});updateBezSVG();playOne(S.sel);});});
}
function bindSl(rid,nid,cb){const r=$(rid),n=$(nid);r.addEventListener('input',e=>{n.value=e.target.value;cb(e.target.value);});n.addEventListener('change',e=>{r.value=e.target.value;cb(e.target.value);});}
function selLevel(lv){S.sel=lv;syncCtrl();}
function saveSnap(){const name=$('snap-name').value.trim()||`Snapshot ${S.snaps.length+1}`;S.snaps.unshift({id:Date.now().toString(),name,ts:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}),h:JSON.parse(JSON.stringify(S.h))});persist();$('snap-name').value='';renderSnaps();}
function loadSnap(id){const s=S.snaps.find(s=>s.id===id);if(!s)return;S.h=JSON.parse(JSON.stringify(s.h));LEVELS.forEach(lv=>applyStyles(lv));syncCtrl();playAll();}
function delSnap(id){S.snaps=S.snaps.filter(s=>s.id!==id);if(S.abA===id)S.abA=null;if(S.abB===id)S.abB=null;persist();renderSnaps();if(S.abMode)renderAB();}
function persist(){localStorage.setItem('tas_v2',JSON.stringify(S.snaps));}
function renderSnaps(){
  const el=$('snap-list');
  if(!S.snaps.length){el.innerHTML='<div class="snap-empty">No snapshots yet</div>';return;}
  el.innerHTML=S.snaps.map(s=>`<div class="snap-item"><div class="snap-item-info"><div class="snap-item-name" title="${s.name}">${s.name}</div><div class="snap-item-time">${s.ts}</div></div><div class="snap-actions"><button class="snap-btn" data-a="load" data-id="${s.id}">Load</button><button class="snap-btn sa ${S.abA===s.id?'on':''}" data-a="seta" data-id="${s.id}">A</button><button class="snap-btn sb ${S.abB===s.id?'on':''}" data-a="setb" data-id="${s.id}">B</button><button class="snap-btn del" data-a="del" data-id="${s.id}">&#x2715;</button></div></div>`).join('');
  el.querySelectorAll('[data-a]').forEach(btn=>{btn.addEventListener('click',()=>{const{a,id}=btn.dataset;if(a==='load')loadSnap(id);else if(a==='del')delSnap(id);else if(a==='seta'){S.abA=S.abA===id?null:id;renderSnaps();if(S.abMode)renderAB();}else if(a==='setb'){S.abB=S.abB===id?null:id;renderSnaps();if(S.abMode)renderAB();}});});
}
function toggleAB(){S.abMode=!S.abMode;$('btn-ab').classList.toggle('active',S.abMode);if(S.abMode)renderAB();else restorePreview();}
function restorePreview(){
  const dark=isDarkBg(S.bg);
  $('preview-scroll').innerHTML=`<div class="preview-canvas bg-${S.bg}${dark?' canvas-dark':''}" id="preview-canvas">${LEVELS.map(lv=>`<div class="preview-heading${lv===S.sel?' selected':''}" id="preview-${lv}" data-level="${lv}"></div>`).join('')}</div>`;
  LEVELS.forEach(lv=>{$('preview-'+lv).addEventListener('click',()=>selLevel(lv));applyStyles(lv);playOne(lv);});
}
function renderAB(){
  const sA=S.snaps.find(s=>s.id===S.abA),sB=S.snaps.find(s=>s.id===S.abB);
  const bgc={warm:'#F5F3EF',white:'#ffffff',dark:'#1A1A1A',black:'#000000'}[S.bg]||'#F5F3EF';
  const dark=isDarkBg(S.bg);
  const txtColor=dark?'rgba(255,255,255,0.9)':'inherit';
  function side(snap,label){if(!snap)return`<div class="ab-side" style="background:${bgc};"><div class="ab-placeholder">No snapshot set for ${label}</div></div>`;return`<div class="ab-side" style="background:${bgc};"><div class="ab-label">${label} <span>— ${snap.name}</span></div>${LEVELS.map(lv=>`<div class="ab-h" id="ab-${label.toLowerCase()}-${lv}" style="color:${txtColor};"></div>`).join('')}</div>`;}
  const scroll=$('preview-scroll');
  scroll.innerHTML=`<div class="ab-wrap">${side(sA,'A')}${side(sB,'B')}</div>`;
  scroll.style.overflow='hidden';
  [['a',sA],['b',sB]].forEach(([side,snap])=>{if(!snap)return;LEVELS.forEach(lv=>{const el=document.getElementById(`ab-${side}-${lv}`);if(!el)return;const h=snap.h[lv];Object.assign(el.style,{fontFamily:h.ff,fontSize:h.fs+'px',fontWeight:h.fw,lineHeight:h.lh,letterSpacing:h.ls+'em',color:dark?txtColor:h.col,paddingTop:h.pt+'px',paddingBottom:h.pb+'px'});el.textContent=h.text;const kid=`kf-ab-${side}-${lv}`;let t=document.getElementById(kid);if(!t){t=document.createElement('style');t.id=kid;document.head.appendChild(t);}t.textContent=`@keyframes ${kid}{from{opacity:0;transform:translateY(${h.y}px);filter:blur(${h.bl}px);}to{opacity:1;transform:none;filter:none;}}`;el.style.animation='none';el.offsetHeight;el.style.animation=`${kid} ${h.dur}ms cubic-bezier(${r3(h.x1)},${r3(h.y1)},${r3(h.x2)},${r3(h.y2)}) ${h.del}ms both`;});});
}
function genCSS(){return LEVELS.map(lv=>{const h=S.h[lv];const ease=`cubic-bezier(${r3(h.x1)}, ${r3(h.y1)}, ${r3(h.x2)}, ${r3(h.y2)})`;return`/* ─── ${lv.toUpperCase()} ─── */\n@keyframes enter-${lv} {\n  from {\n    opacity: 0;\n    transform: translateY(${h.y}px);\n    filter: blur(${h.bl}px);\n  }\n  to {\n    opacity: 1;\n    transform: translateY(0);\n    filter: blur(0);\n  }\n}\n\n${lv} {\n  font-family: ${h.ff};\n  font-size: ${h.fs}px;\n  font-weight: ${h.fw};\n  line-height: ${h.lh};\n  letter-spacing: ${h.ls}em;\n  color: ${h.col};\n  padding-top: ${h.pt}px;\n  padding-bottom: ${h.pb}px;\n  animation: enter-${lv} ${h.dur}ms ${ease} ${h.del}ms both;\n}`;}).join('\n\n');}
const COLS=['Snapshot','Level','Text','Font','Size','Weight','Line-H','Tracking','Color','Pad-T','Pad-B','Duration','Delay','Y','Blur','Easing'];
function collectRows(){const sets=[{name:'Current',h:S.h},...S.snaps.map(s=>({name:s.name,h:s.h}))];return sets.flatMap(({name,h})=>LEVELS.map(lv=>{const d=h[lv];const ease=`cubic-bezier(${r3(d.x1)},${r3(d.y1)},${r3(d.x2)},${r3(d.y2)})`;return[name,lv.toUpperCase(),trunc(d.text,28),d.ff.replace(/'/g,'').split(',')[0].trim(),d.fs+'px',d.fw,d.lh,d.ls+'em',d.col,d.pt+'px',d.pb+'px',d.dur+'ms',d.del+'ms',d.y+'px',d.bl+'px',ease];}));}
function genTableHTML(rows){return`<table class="exp-tbl"><thead><tr>${COLS.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map((c,i)=>i===1?`<td class="lvl-cell">${c}</td>`:`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;}
function genCSV(rows){return[COLS,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');}
function dlFile(content,name,type){const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([content],{type})),download:name});a.click();URL.revokeObjectURL(a.href);}
function openExport(tab){$('export-modal').style.display='flex';$('exp-css').value=genCSS();$('exp-tbl-wrap').innerHTML=genTableHTML(collectRows());setMT(tab);}
function setMT(tab){document.querySelectorAll('[data-mt]').forEach(b=>b.classList.toggle('active',b.dataset.mt===tab));$('mpane-css').style.display=tab==='css'?'flex':'none';$('mpane-table').style.display=tab==='table'?'flex':'none';}
function $(id){return document.getElementById(id);}
function r3(v){return+v.toFixed(3);}
function trunc(s,n){return s.length>n?s.slice(0,n)+'…':s;}
function init(){
  LEVELS.forEach((lv,i)=>{applyStyles(lv);setTimeout(()=>playOne(lv),120+i*80);});
  syncCtrl(); renderSnaps(); initBezDrag(); bindCtrl();
  $('level-tabs').addEventListener('click',e=>{const b=e.target.closest('.level-tab');if(b)selLevel(b.dataset.level);});
  LEVELS.forEach(lv=>{$('preview-'+lv).addEventListener('click',()=>selLevel(lv));});
  $('btn-replay').addEventListener('click',playAll);
  $('btn-replay-sel').addEventListener('click',()=>playOne(S.sel));
  $('btn-ab').addEventListener('click',toggleAB);
  document.querySelectorAll('.bg-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.bg-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');S.bg=btn.dataset.bg;const dark=isDarkBg(S.bg);if(!S.abMode){const c=$('preview-canvas');c.className='preview-canvas bg-'+S.bg+(dark?' canvas-dark':'');}else renderAB();});});
  $('btn-save-snap').addEventListener('click',saveSnap);
  $('snap-name').addEventListener('keydown',e=>{if(e.key==='Enter')saveSnap();});
  $('btn-export').addEventListener('click',()=>openExport('css'));
  $('modal-close').addEventListener('click',()=>$('export-modal').style.display='none');
  $('export-modal').addEventListener('click',e=>{if(e.target===$('export-modal'))$('export-modal').style.display='none';});
  document.querySelectorAll('[data-mt]').forEach(b=>b.addEventListener('click',()=>setMT(b.dataset.mt)));
  $('btn-copy-css').addEventListener('click',()=>{const t=$('exp-css');navigator.clipboard.writeText(t.value).then(()=>{$('btn-copy-css').textContent='✓ Copied!';setTimeout(()=>$('btn-copy-css').textContent='Copy CSS',2000);}).catch(()=>{t.select();document.execCommand('copy');});});
  $('btn-dl-css').addEventListener('click',()=>dlFile($('exp-css').value,'animation.css','text/css'));
  $('btn-copy-csv').addEventListener('click',()=>{const csv=genCSV(collectRows());navigator.clipboard.writeText(csv).then(()=>{$('btn-copy-csv').textContent='✓ Copied!';setTimeout(()=>$('btn-copy-csv').textContent='Copy CSV',2000);}).catch(()=>{});});
  $('btn-dl-csv').addEventListener('click',()=>dlFile(genCSV(collectRows()),'animation-values.csv','text/csv'));
  document.addEventListener('keydown',e=>{const tag=e.target.tagName;if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;if(e.code==='Space'){e.preventDefault();playAll();}if(e.key>='1'&&e.key<='5')selLevel('h'+e.key);if(e.key==='Escape')$('export-modal').style.display='none';if((e.metaKey||e.ctrlKey)&&e.key==='e'){e.preventDefault();openExport('css');}});
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
